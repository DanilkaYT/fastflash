<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тарифы FASTFLASH VPN</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #000;
            color: #e0ffe0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.25;
            pointer-events: none;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
            flex-grow: 1;
            padding: 20px;
            width: 100%;
        }
        
        header {
            padding: 40px 20px 10px;
            animation: fadeInDown 1s ease;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #2ecc71;
            text-shadow: 0 0 15px rgba(46, 204, 113, 0.6);
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #81c784;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 20px;
            border-radius: 8px;
            line-height: 1.5;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        .cube-section {
            margin: 20px auto 10px;
            width: 180px;
            height: 180px;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #cube-canvas {
            background: rgba(0, 20, 0, 0.2);
            border-radius: 20px;
        }

        /* Сетка тарифов */
        .tariffs-grid {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 20px;
            margin: 30px auto;
            max-width: 1400px;
            flex-wrap: wrap;
        }

        /* Карточка тарифа */
        .tariff-card {
            background: rgba(18, 18, 18, 0.85);
            border: 1px solid rgba(46, 204, 113, 0.25);
            border-radius: 20px;
            padding: 30px 20px;
            width: 320px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .tariff-card:hover {
            transform: translateY(-5px);
            border-color: #2ecc71;
            box-shadow: 0 15px 30px rgba(46, 204, 113, 0.2);
        }

        /* Акцент на популярном тарифе */
        .tariff-card.popular {
            border: 2px solid #00f3ff;
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.25);
        }

        .tariff-card.popular:hover {
            box-shadow: 0 0 35px rgba(0, 243, 255, 0.4);
        }

        .badge {
            position: absolute;
            top: -13px;
            left: 50%;
            transform: translateX(-50%);
            background: #00f3ff;
            color: #000;
            padding: 4px 18px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.6);
        }

        .tariff-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .tariff-subtitle {
            font-size: 0.9rem;
            color: #81c784;
            margin-bottom: 15px;
            font-style: italic;
        }

        .tariff-price-box {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(46, 204, 113, 0.15);
        }

        .tariff-card.popular .tariff-price-box {
            border-bottom-color: rgba(0, 243, 255, 0.2);
        }

        .price {
            font-size: 2.8rem;
            font-weight: 700;
            color: #2ecc71;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
        }

        .tariff-card.popular .price {
            color: #00f3ff;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        .currency {
            font-size: 1.6rem;
            margin-left: 5px;
        }

        .period {
            font-size: 0.9rem;
            color: #81c784;
            margin-top: 5px;
            display: block;
        }

        .features-list {
            list-style: none;
            text-align: left;
            margin-bottom: 20px;
        }

        .features-list li {
            font-size: 0.9rem;
            color: #c8e6c9;
            margin-bottom: 10px;
            display: flex;
            align-items: flex-start;
            line-height: 1.4;
        }

        .li-icon {
            color: #2ecc71;
            margin-right: 10px;
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .tariff-card.popular .li-icon {
            color: #00f3ff;
        }

        .bonus-section {
            background: rgba(0, 243, 255, 0.05);
            border: 1px dashed rgba(0, 243, 255, 0.3);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: left;
        }

        .bonus-title {
            color: #00f3ff;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bonus-text {
            color: #e0ffe0;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        /* Стили выпадающего списка локаций */
        .locations-dropdown {
            margin-bottom: 25px;
            text-align: left;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            border: 1px solid rgba(46, 204, 113, 0.15);
            overflow: hidden;
        }

        .tariff-card.popular .locations-dropdown {
            border-color: rgba(0, 243, 255, 0.2);
        }

        .dropdown-trigger {
            width: 100%;
            background: none;
            border: none;
            color: #81c784;
            padding: 12px 15px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .dropdown-trigger:hover {
            background: rgba(46, 204, 113, 0.05);
            color: #2ecc71;
        }

        .tariff-card.popular .dropdown-trigger:hover {
            background: rgba(0, 243, 255, 0.05);
            color: #00f3ff;
        }

        .dropdown-trigger::after {
            content: '▼';
            font-size: 0.7rem;
            transition: transform 0.3s;
        }

        .locations-dropdown.open .dropdown-trigger::after {
            transform: rotate(180deg);
        }

        .dropdown-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding: 0 15px;
        }

        .locations-dropdown.open .dropdown-content {
            max-height: 350px;
            padding: 5px 15px 15px 15px;
            overflow-y: auto;
        }

        .dropdown-content::-webkit-scrollbar {
            width: 4px;
        }
        .dropdown-content::-webkit-scrollbar-thumb {
            background: rgba(46, 204, 113, 0.3);
            border-radius: 4px;
        }

        .loc-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.9rem;
            padding: 6px 0;
            border-bottom: 1px solid rgba(46, 204, 113, 0.1);
            color: #e0ffe0;
        }

        .loc-item:last-child {
            border-bottom: none;
        }

        .loc-name {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .flag {
            font-size: 1.1rem;
        }

        .protocol {
            font-family: monospace;
            font-size: 0.75rem;
            background: rgba(46, 204, 113, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }

        .tariff-card.popular .protocol {
            background: rgba(0, 243, 255, 0.15);
            border-color: rgba(0, 243, 255, 0.2);
        }

        .buttons-wrapper {
            margin-top: auto;
        }

        .tariff-btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            border: 2px solid #2ecc71;
            background: rgba(0, 0, 0, 0.6);
            color: #2ecc71;
            text-transform: uppercase;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .tariff-btn:hover {
            background: rgba(46, 204, 113, 0.1);
            color: #fff;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.4);
        }

        .tariff-card.popular .tariff-btn {
            border: none;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: #fff;
            box-shadow: 0 4px 15px rgba(0, 114, 255, 0.4);
        }

        .tariff-card.popular .tariff-btn:hover {
            background: linear-gradient(90deg, #00f3ff, #00c6ff);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.6);
            transform: scale(1.02);
        }

        .back-nav {
            margin: 20px 0 40px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 1px solid rgba(46, 204, 113, 0.4);
            background: rgba(0, 0, 0, 0.8);
            color: #81c784;
        }

        .btn-back:hover {
            border-color: #2ecc71;
            color: #2ecc71;
            box-shadow: 0 0 15px rgba(46, 204, 113, 0.2);
        }

        footer {
            padding: 30px;
            font-size: 0.85rem;
            color: #1b5e20;
            border-top: 1px solid rgba(46, 204, 113, 0.1);
            background: rgba(0,0,0,0.8);
            z-index: 1;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #2ecc71;
        }
        
        @keyframes fadeInDown {
            from { opacity: 0;
            transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0);
            }
        }
        
        @media (max-width: 1400px) {
            .tariffs-grid {
                flex-wrap: wrap;
            }
            .tariff-card {
                width: calc(50% - 20px);
                max-width: 400px;
            }
        }

        @media (max-width: 900px) {
            .tariff-card {
                width: 100%;
                max-width: 450px;
            }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem;
            letter-spacing: 2px; }
            .subtitle { font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div class="container">
        <header>
            <h1>ТАРИФЫ FASTFLASH VPN</h1>
            <p class="subtitle">Официальный сайт подписок vpn.fastflash.shop</p>
        </header>

        <div class="cube-section">
            <canvas id="cube-canvas" width="180" height="180"></canvas>
        </div>
        
        <div class="tariffs-grid" id="tariffs-container">
            <div class="loading">Загрузка тарифов...</div>
        </div>

        <div class="back-nav">
            <a href="index.html" class="btn-back">← Назад на главную</a>
        </div>
    </div>

    <footer>
        <p>© 2026 FastFlash</p>
    </footer>

    <script src="script.js"></script>
    <script src="cube.js"></script>

    <script>
        // URL к JSON файлу с тарифами
        const TARIFFS_JSON_URL = 'tariffs.json'; // Или полный URL: 'https://yourdomain.com/tariffs.json'

        // Функция загрузки тарифов из JSON
        async function loadTariffs() {
            try {
                const response = await fetch(TARIFFS_JSON_URL);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const tariffs = await response.json();
                renderTariffs(tariffs);
            } catch (error) {
                console.error('Ошибка загрузки тарифов:', error);
                document.getElementById('tariffs-container').innerHTML = 
                    '<div class="loading" style="color: #ff4444;">Ошибка загрузки тарифов. Попробуйте обновить страницу.</div>';
            }
        }

        // Функция отрисовки тарифов
        function renderTariffs(tariffs) {
            const container = document.getElementById('tariffs-container');
            container.innerHTML = '';

            tariffs.forEach(tariff => {
                const card = createTariffCard(tariff);
                container.appendChild(card);
            });
        }

        // Создание карточки тарифа
        function createTariffCard(tariff) {
            const card = document.createElement('div');
            card.className = `tariff-card ${tariff.popular ? 'popular' : ''}`;

            const badge = tariff.popular ? '<div class="badge">Популярный</div>' : '';
            
            const locationsCount = tariff.locations ? tariff.locations.length : 0;
            
            let locationsHTML = '';
            if (tariff.locations && tariff.locations.length > 0) {
                const locationsList = tariff.locations.map(loc => `
                    <div class="loc-item">
                        <span class="loc-name">
                            <span class="flag">${loc.flag}</span>
                            ${loc.name}${loc.servers ? ` (${loc.servers})` : ''}
                        </span>
                        <span class="protocol">${loc.protocol}</span>
                    </div>
                `).join('');

                locationsHTML = `
                    <div class="locations-dropdown">
                        <button class="dropdown-trigger" onclick="toggleDropdown(this)">
                            Доступные локации (${locationsCount})
                        </button>
                        <div class="dropdown-content">
                            ${locationsList}
                        </div>
                    </div>
                `;
            }

            let bonusHTML = '';
            if (tariff.bonus) {
                bonusHTML = `
                    <div class="bonus-section">
                        <div class="bonus-title">🎁 Бонус</div>
                        <div class="bonus-text">${tariff.bonus}</div>
                    </div>
                `;
            }

            card.innerHTML = `
                ${badge}
                <div class="tariff-title">${tariff.name}</div>
                <div class="tariff-subtitle">${tariff.subtitle}</div>
                <div class="tariff-price-box">
                    <div class="price">${tariff.price}<span class="currency">₽</span></div>
                    <span class="period">на ${tariff.period} дней</span>
                </div>
                <ul class="features-list">
                    ${tariff.features.map(feature => `
                        <li><span class="li-icon">✦</span> ${feature}</li>
                    `).join('')}
                </ul>
                ${bonusHTML}
                ${locationsHTML}
                <div class="buttons-wrapper">
                    <a href="${tariff.buyLink}" target="_blank" class="tariff-btn">Купить ${tariff.name}</a>
                </div>
            `;

            return card;
        }

        // Функция переключения dropdown
        function toggleDropdown(button) {
            const dropdown = button.parentElement;
            dropdown.classList.toggle('open');
        }

        // Загрузка тарифов при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadTariffs);
    </script>
</body>
</html>
