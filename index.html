<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #000;
            color: #e0ffe0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #matrix {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.25;
            pointer-events: none;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            position: relative;
            z-index: 1;
            flex-grow: 1;
            padding: 20px;
        }
        
        header {
            padding: 60px 20px 40px;
            animation: fadeInDown 1s ease;
        }
        
        h1 {
            font-size: 3.5rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #2ecc71;
            text-shadow: 0 0 15px rgba(46, 204, 113, 0.6);
            font-weight: 700;
        }
        
        .subtitle {
            font-size: 1.1rem;
            color: #81c784;
            max-width: 600px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 20px;
            border-radius: 8px;
            line-height: 1.5;
            border: 1px solid rgba(46, 204, 113, 0.2);
        }
        
        .links-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-top: 40px;
        }

        .btn {
            display: flex; 
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 400px;
            text-decoration: none;
            padding: 18px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 2px solid #2ecc71;
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.8);
            color: #2ecc71;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.1);
        }

        /* Стиль для одинакового отображения иконок */
        .icon {
            margin-right: 12px;
            font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
            font-style: normal;
            font-size: 1.2rem;
            display: inline-block;
            vertical-align: middle;
        }

        .btn:hover {
            background: rgba(46, 204, 113, 0.1);
            color: #fff;
            border-color: #fff;
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
        }

        .cube-section {
            margin: 50px auto 30px;
            width: 250px;
            height: 250px;
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #cube-canvas {
            background: rgba(0, 20, 0, 0.2);
            border-radius: 20px;
        }

        .cube-label {
            font-size: 10px;
            color: #2ecc71;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 15px;
            opacity: 0.7;
        }

        footer {
            padding: 30px;
            font-size: 0.85rem;
            color: #1b5e20;
            border-top: 1px solid rgba(46, 204, 113, 0.1);
            background: rgba(0,0,0,0.8);
            z-index: 1;
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; letter-spacing: 2px; }
            .btn { width: 90%; font-size: 0.9rem; padding: 15px; }
            .cube-section { width: 200px; height: 200px; }
        }
    </style>
</head>

    <canvas id="matrix"></canvas>

        </header>

            </a>

            <a href="https://www.avito.ru/user/d67b1a105ae799e493174694ce400bdf/profile" target="_blank" class="btn">
                <i class="icon">📦</i> Наш Avito
            </a>

            <a href="https://t.me/perekupstr" target="_blank" class="btn">
                <i class="icon">🤝</i> Перекупы Стерлитамака
            </a>
        </div>

        <div class="cube-section">
            <canvas id="cube-canvas" width="250" height="250"></canvas>

</html>
