<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подключение FastFlash Proxy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #007AFF;
            --dark: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
        }

        .container {
            text-align: center;
            background: var(--surface);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--primary);
        }

        .description {
            color: var(--text-dim);
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-happ {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 18px 30px;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
        }

        .btn-happ:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 122, 255, 0.4);
            background: #0084ff;
        }

        .btn-happ:active {
            transform: translateY(0);
        }

        .help-text {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .help-text a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Fast<span>Flash</span></div>
        <p class="description">Нажмите кнопку ниже, чтобы автоматически импортировать настройки защищенного соединения в приложение Happ Proxy.</p>

        <!-- ВСТАВЬТЕ ВАШУ ССЫЛКУ В HREF -->
        <a href="happ://crypt5/ВАША_ССЫЛКА_ПОСЛЕ_API" class="btn-happ" id="happLink">
            <i class="fa-solid fa-bolt-lightning"></i>
            Добавить в Happ
        </a>

        <div class="help-text">
            Нет приложения? <a href="https://www.happ.su/main/download" target="_blank">Скачать Happ Proxy</a>
        </div>
    </div>

    <script>
        document.getElementById('happLink').addEventListener('click', function(e) {
            const start = Date.now();
            
            // Если через 2 секунды браузер все еще на этой странице, значит приложение не открылось
            setTimeout(function() {
                if (Date.now() - start < 2500) {
                    if (confirm("Похоже, Happ Proxy не установлен. Перейти на страницу загрузки?")) {
                        window.location.href = "https://www.happ.su/main/download";
                    }
                }
            }, 2000);
        });
    </script>

</body>
</html>
