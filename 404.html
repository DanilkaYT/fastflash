<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Страница не найдена | fastflash</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-text-size-adjust: 100%;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: #000;
            color: #e0ffe0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Контейнер для 3D куба */
        #cube-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(46, 204, 113, 0.3);
            max-width: 90%;
        }
        
        h1 {
            font-size: 6rem;
            margin-bottom: 0;
            color: #2ecc71;
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.8);
            letter-spacing: 10px;
            animation: glitch 2s infinite;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #81c784;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        
        .btn {
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.3s ease;
            border: 2px solid #2ecc71;
            background: rgba(0, 0, 0, 0.8);
            color: #2ecc71;
        }

        .btn:hover {
            background: #2ecc71;
            color: #000;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.6);
            transform: scale(1.05);
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 4rem; }
            .subtitle { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <canvas id="cube-container"></canvas>

    <div class="container">
        <h1>404</h1>
        <p class="subtitle">Ошибка: Данные повреждены или страница удалена</p>
        <a href="/" class="btn">Вернуться на главную</a>
    </div>

    <script src="cube.js"></script>
</body>
</html>
